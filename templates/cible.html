<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Révision ciblée</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .chip { display: inline-block; padding: 8px 15px; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; margin: 5px; background: white; }
        .chip.active { background: #007bff; color: white; border-color: #007bff; }
        .chip input { display: none; }
    </style>
</head>
<body>
<div class="container" style="width: 600px;">
    <h1>Révision ciblée</h1>
    <form action="/cible_start" method="POST">
        <div class="section">
            <h3>Modes</h3>
            {% for m in modes %}
            <label class="chip">
                <input type="checkbox" name="modes" value="{{ m }}"> {{ m }}
            </label>
            {% endfor %}
        </div>

        <button type="submit" class="btn" style="width:100%">Lancer la session</button>
        <a href="/" class="back-button">Annuler</a>
    </form>
</div>

<script>
    // Le petit script simple pour les couleurs des chips
    document.querySelectorAll('.chip').forEach(c => {
        c.addEventListener('click', () => {
            const input = c.querySelector('input');
            setTimeout(() => { c.classList.toggle('active', input.checked); }, 50);
        });
    });
</script>
</body>
</html>
