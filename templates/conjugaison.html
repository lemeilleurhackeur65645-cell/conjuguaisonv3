<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Conjugaison</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Conjuguer un verbe</h1>

    <form method="POST">
        <label>Verbe :</label>
        <input type="text" name="verbe" required>

        <label>Mode :</label>
        <input type="text" name="mode" required>

        <label>Temps :</label>
        <input type="text" name="temps" required>

        <button type="submit" class="button">Conjuguer</button>
    </form>

    {% if erreur %}
        <div class="error">{{ erreur }}</div>
    {% endif %}

    {% if resultat %}
        <div class="result">
            <h2>Résultat :</h2>
            <ul>
                {% for ligne in resultat %}
                    <li>{{ ligne }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}
</div>

</body>
</html>
