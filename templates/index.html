<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Quiz de Conjugaison</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- ============================
     CARTE 1 — QUIZ CLASSIQUE
     ============================ -->
<div class="container">
    <h1>Quiz de Conjugaison</h1>
    <p>Un verbe, un mode, un temps, un pronom… à toi de jouer. (liste 1 à 4)</p>

    <!-- Interrupteur -->
    <form action="/quiz" method="get">

        <div class="switch-container">
            <label class="switch-label">Mode entraînement</label>
            <label class="switch">
                <input type="checkbox" name="mode" value="evaluation">
                <span class="slider"></span>
            </label>
            <label class="switch-label">Mode évaluation</label>
        </div>

        <button type="submit" class="btn">Commencer</button>
        
    </form>
</div>


<!-- ============================
     CARTE 2 — RÉVISION CIBLÉE
     ============================ -->
<div class="container" style="margin-top: 40px;">
    <h1>Révision ciblée</h1>
    <p>Choisis précisément les modes, temps, personnes, voix et verbes que tu souhaites travailler.</p>

    <a href="/cible" class="btn">Révision ciblée</a>
</div>


<!-- ============================
     FOOTER — JOURNAL DES MODIFS
     ============================ -->
<div class="menu-footer">
    <a href="/changelog" class="menu-link">Journal des modifications</a>
</div>

</body>
</html>
